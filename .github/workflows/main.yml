name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: stable
          cache: false

      - run: flutter pub get

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias alaa-islamic \
            -keyalg RSA -keysize 2048 \
            -validity 9125 \
            -keystore alaa-islamic.jks \
            -storepass alaaislamic123 \
            -keypass alaaislamic123 \
            -dname "CN=AlaaIslamic,O=Islamic,C=EG" \
            -noprompt

      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=STORE_FILE=${{ github.workspace }}/alaa-islamic.jks \
            --dart-define=STORE_PASSWORD=alaaislamic123 \
            --dart-define=KEY_ALIAS=alaa-islamic \
            --dart-define=KEY_PASSWORD=alaaislamic123
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
